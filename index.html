<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retro Space Slots</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="space-background" aria-hidden="true"></canvas>
    <div class="crt-overlay" aria-hidden="true"></div>

    <main class="game-shell" aria-labelledby="game-title">
      <section class="machine" aria-label="Slot machine">
        <div class="machine__header">
          <div>
            <p class="eyebrow">Pixel Orbit Casino</p>
            <h1 id="game-title">Retro Space Slots</h1>
          </div>
          <div class="balance-panel" aria-live="polite">
            <span>Tokens</span>
            <strong id="balance">100</strong>
          </div>
        </div>

        <div id="status" class="status status--ready" role="status" aria-live="polite">
          Ready to spin.
        </div>

        <div class="reels" id="reels" role="group" aria-label="Five independent reels">
          <div class="reel" data-reel="0" role="group" aria-label="Reel 1">
            <div class="symbol symbol--top" role="img" aria-label="Orb" data-symbol="ORB">◎</div>
            <div class="symbol symbol--center" role="img" aria-label="Seven" data-symbol="7">7</div>
            <div class="symbol symbol--bottom" role="img" aria-label="Gem" data-symbol="GEM">◆</div>
          </div>
          <div class="reel" data-reel="1" role="group" aria-label="Reel 2">
            <div class="symbol symbol--top" role="img" aria-label="Gem" data-symbol="GEM">◆</div>
            <div class="symbol symbol--center" role="img" aria-label="Bar" data-symbol="BAR">▰</div>
            <div class="symbol symbol--bottom" role="img" aria-label="Star" data-symbol="STAR">★</div>
          </div>
          <div class="reel" data-reel="2" role="group" aria-label="Reel 3">
            <div class="symbol symbol--top" role="img" aria-label="Star" data-symbol="STAR">★</div>
            <div class="symbol symbol--center" role="img" aria-label="Orb" data-symbol="ORB">◎</div>
            <div class="symbol symbol--bottom" role="img" aria-label="Comet" data-symbol="COMET">☄</div>
          </div>
          <div class="reel" data-reel="3" role="group" aria-label="Reel 4">
            <div class="symbol symbol--top" role="img" aria-label="Comet" data-symbol="COMET">☄</div>
            <div class="symbol symbol--center" role="img" aria-label="Gem" data-symbol="GEM">◆</div>
            <div class="symbol symbol--bottom" role="img" aria-label="Bar" data-symbol="BAR">▰</div>
          </div>
          <div class="reel" data-reel="4" role="group" aria-label="Reel 5">
            <div class="symbol symbol--top" role="img" aria-label="Bar" data-symbol="BAR">▰</div>
            <div class="symbol symbol--center" role="img" aria-label="Star" data-symbol="STAR">★</div>
            <div class="symbol symbol--bottom" role="img" aria-label="Seven" data-symbol="7">7</div>
          </div>
        </div>

        <div class="payline-guide" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <form class="controls" id="controls">
          <label for="bet">Bet</label>
          <div class="bet-control">
            <button class="icon-button" type="button" id="decrease-bet" aria-label="Decrease bet">-</button>
            <input id="bet" name="bet" type="number" min="1" max="10" step="1" value="5">
            <button class="icon-button" type="button" id="increase-bet" aria-label="Increase bet">+</button>
          </div>
          <button class="spin-button" id="spin-button" type="submit">
            <span aria-hidden="true">&gt;</span>
            Spin
          </button>
        </form>
      </section>

      <section class="paytable-tab" aria-labelledby="paytable-title">
        <button
          class="paytable-tab__button"
          id="paytable-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="paytable-panel"
        >
          <span id="paytable-title">Pay Table</span>
          <span class="paytable-tab__icon" aria-hidden="true">+</span>
        </button>
        <div class="paytable-tab__panel" id="paytable-panel" hidden>
          <div class="paytable-rules">
            <p>Wins are checked left to right across adjacent reels on the 3-by-5 grid.</p>
            <p>Three, four, or five matching symbols pay when each step stays level or moves one row up/down.</p>
          </div>
          <h2>Path Rules</h2>
          <div id="payline-list" class="payline-list"></div>
          <h2>Symbol Payouts</h2>
          <div id="paytable-list" class="paytable__list"></div>
        </div>
      </section>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
